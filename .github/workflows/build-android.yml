name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'manifest.json'
      - 'sw.js'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android.keystore

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "in.shivaaionline.twa",
            "host": "shivaaionline.in",
            "name": "Shiv AI - Divine Wisdom",
            "launcherName": "Shiv AI",
            "display": "standalone",
            "themeColor": "#FF6B35",
            "themeColorDark": "#0A0A1A",
            "navigationColor": "#0A0A1A",
            "navigationColorDark": "#0A0A1A",
            "navigationDividerColor": "#0A0A1A",
            "navigationDividerColorDark": "#0A0A1A",
            "backgroundColor": "#0A0A1A",
            "enableNotifications": true,
            "startUrl": "/",
            "iconUrl": "https://shivaaionline.in/icons/icon-512.png",
            "maskableIconUrl": "https://shivaaionline.in/icons/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "my-key-alias"
            },
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://shivaaionline.in/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://shivaaionline.in/",
            "minSdkVersion": 21,
            "orientation": "portrait",
            "fingerprints": [
              {
                "name": "built-in",
                "value": "63:46:92:05:35:F5:DB:54:66:C4:EC:6E:70:9F:DC:41:CB:22:CE:CE:51:64:F9:14:59:20:A2:23:86:0E:87:C3"
              }
            ],
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "protocolHandlers": [],
            "fileHandlers": [],
            "launchHandlerClientMode": "",
            "displayOverride": [],
            "appVersion": "1.0.0"
          }
          EOF

      - name: Build TWA project
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --keystorePassword "${{ secrets.KEYSTORE_PASSWORD }}" \
            --keyPassword "${{ secrets.KEY_PASSWORD }}"

      - name: Find AAB file
        run: |
          find . -name "*.aab" -o -name "app-release-bundle.aab" 2>/dev/null | head -5

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiv-ai-android-aab
          path: |
            app-release-bundle.aab
            **/*.aab
          if-no-files-found: warn
          retention-days: 30
